<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Daniel Osornio</title>
</head>
<body>

    <h2>Agenda de Contactos</h2>
    
    <input type="text" id="nom" placeholder="Nombre"> <br>
    <input type="text" id="dir" placeholder="Dirección"> <br>
    <input type="text" id="tel" placeholder="Teléfono"> <br>
    <input type="email" id="mail" placeholder="Correo"> <br>
    <input type="url" id="foto" placeholder="URL Foto"> <br>
    <button onclick="agregarContacto()">Guardar Contacto</button> 
    
    <hr>
    
    <label>Buscar:</label>
    <input type="text" id="buscar" oninput="buscarContacto()">

    <div id="lista-contactos"></div>

    <script>
        // Cargar datos al inicio
        let agenda = JSON.parse(localStorage.getItem("contactos")) || [];
        actualizarLista();

        function agregarContacto() {
            // Capturar valores
            const nombre = document.getElementById("nom").value;
            const direccion = document.getElementById("dir").value;
            const telefono = document.getElementById("tel").value;
            const correo = document.getElementById("mail").value;
            const foto = document.getElementById("foto").value;

            if (nombre) {
                // Objeto literal
                const nuevo = {
                    nombre: nombre,
                    direccion: direccion,
                    telefono: telefono,
                    correo: correo,
                    foto: foto
                };

                agenda.push(nuevo);

                // Reto 1: Ordenar alfabéticamente
                agenda.sort((a, b) => a.nombre.localeCompare(b.nombre));

                guardar();
                limpiarFormulario();
            }
        }

        function actualizarLista() {
            const contenedor = document.getElementById("lista-contactos");
            let html = "<ul>";

            agenda.forEach((c, indice) => {
                html += `
                    <li>
                        <img src="${c.foto}" width="30"> 
                        <b>${c.nombre}</b> - ${c.telefono} 
                        <button onclick="eliminarContacto(${indice})">Eliminar</button>
                    </li>`;
            });

            html += "</ul>";
            contenedor.innerHTML = html;
        }

        function buscarContacto() {
            const texto = document.getElementById("buscar").value.toLowerCase();
            const contenedor = document.getElementById("lista-contactos");
            let html = "<ul>";

            // Filtrar contactos
            agenda.forEach((c, indice) => {
                if (c.nombre.toLowerCase().includes(texto) || c.telefono.includes(texto)) {
                    html += `
                        <li>
                            <img src="${c.foto}" width="30"> 
                            <b>${c.nombre}</b> - ${c.telefono} 
                            <button onclick="eliminarContacto(${indice})">Eliminar</button>
                        </li>`;
                }
            });

            html += "</ul>";
            contenedor.innerHTML = html;
        }

        function eliminarContacto(indice) {
            agenda.splice(indice, 1); // Quitar contactos
            guardar();
        }

        function guardar() {
            localStorage.setItem("contactos", JSON.stringify(agenda));
            actualizarLista();
        }

        function limpiarFormulario() {
            document.getElementById("nom").value = "";
            document.getElementById("dir").value = "";
            document.getElementById("tel").value = "";
            document.getElementById("mail").value = "";
            document.getElementById("foto").value = "";
        }
    </script>
</body>
</html>
